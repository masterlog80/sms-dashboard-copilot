<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Dashboard Copilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .datetime {
            color: #666;
            font-size: 1.1em;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            color: #667eea;
            font-weight: bold;
        }
        
        .stat-label {
            color: #666;
            margin-top: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
            width: 100%;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .messages-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .message-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .message-from {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .message-text {
            color: #333;
            margin-bottom: 5px;
        }
        
        .message-time {
            color: #999;
            font-size: 0.9em;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #4caf50;
        }
        
        .status-text {
            color: #333;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .stats {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 SMS Dashboard Copilot</h1>
            <p class="datetime" id="datetime">Current Date and Time (UTC): Loading...</p>
        </header>
        
        <div class="dashboard">
            <!-- Statistics Card -->
            <div class="card">
                <h2>📊 Statistics</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-number" id="total-messages">0</div>
                        <div class="stat-label">Total Messages</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="unread-messages">0</div>
                        <div class="stat-label">Unread</div>
                    </div>
                </div>
            </div>
            
            <!-- Status Card -->
            <div class="card">
                <h2>⚙️ Status</h2>
                <div class="status">
                    <div class="status-indicator"></div>
                    <div class="status-text">GSM Modem: Connected</div>
                </div>
                <div style="margin-top: 15px; color: #666;">
                    <p><strong>Port:</strong> /dev/ttyUSB0</p>
                    <p><strong>Baud Rate:</strong> 9600</p>
                </div>
            </div>
        </div>
        
        <div class="dashboard">
            <!-- Send SMS Card -->
            <div class="card">
                <h2>✉️ Send SMS</h2>
                <form id="sms-form">
                    <div class="form-group">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" id="phone" name="phone" placeholder="+1234567890" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" placeholder="Type your message..." required></textarea>
                    </div>
                    <button type="submit">Send SMS</button>
                </form>
            </div>
            
            <!-- Messages Card -->
            <div class="card">
                <h2>📬 Recent Messages</h2>
                <div class="messages-list" id="messages-list">
                    <div class="message-item">
                        <div class="message-from">+1234567890</div>
                        <div class="message-text">Welcome to SMS Dashboard Copilot!</div>
                        <div class="message-time">2026-03-11 02:41:14</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Update datetime
        function updateDateTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                timeZone: 'UTC'
            };
            document.getElementById('datetime').textContent = 
                'Current Date and Time (UTC): ' + now.toLocaleString('en-US', options);
        }
        
        // Update on load and every second
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        // Handle SMS form submission
        document.getElementById('sms-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;
            
            fetch('/api/message', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    phone: phone,
                    message: message,
                    timestamp: new Date().toISOString()
                })
            })
            .then(response => response.json())
            .then(data => {
                alert('SMS sent successfully!');
                document.getElementById('sms-form').reset();
                // Add message to recent messages
                addMessage(phone, message);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error sending SMS');
            });
        });
        
        function addMessage(phone, text) {
            const messagesList = document.getElementById('messages-list');
            const now = new Date();
            const timeStr = now.toLocaleString('en-US', { 
                year: 'numeric',
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            
            const messageHtml = `
                <div class="message-item">
                    <div class="message-from">${phone}</div>
                    <div class="message-text">${text}</div>
                    <div class="message-time">${timeStr}</div>
                </div>
            `;
            
            messagesList.innerHTML = messageHtml + messagesList.innerHTML;
        }
    </script>
</body>
</html>
