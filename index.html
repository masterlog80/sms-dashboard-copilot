<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Dashboard Copilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .datetime {
            color: #666;
            font-size: 1.1em;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            color: #667eea;
            font-weight: bold;
        }
        
        .stat-label {
            color: #666;
            margin-top: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
            width: 100%;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        
        .button-group button {
            flex: 1;
        }
        
        .clear-btn {
            background: #ff9800;
        }
        
        .clear-btn:hover {
            background: #f57c00;
        }
        
        .messages-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .message-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        
        .message-item.received {
            border-left-color: #4caf50;
        }
        
        .message-item.sent {
            border-left-color: #2196f3;
        }
        
        .message-content {
            flex: 1;
        }
        
        .message-from {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .message-item.received .message-from {
            color: #4caf50;
        }
        
        .message-item.sent .message-from {
            color: #2196f3;
        }
        
        .message-text {
            color: #333;
            margin-bottom: 5px;
            word-break: break-word;
        }
        
        .message-time {
            color: #999;
            font-size: 0.9em;
        }
        
        .message-actions {
            display: flex;
            gap: 5px;
        }
        
        .delete-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
            width: auto;
        }
        
        .delete-btn:hover {
            background: #d32f2f;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-text {
            color: #333;
        }
        
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .stats {
                flex-direction: column;
                gap: 20px;
            }
            
            .message-item {
                flex-direction: column;
            }
            
            .message-actions {
                width: 100%;
            }
            
            .delete-btn {
                width: 100%;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 SMS Dashboard Copilot</h1>
            <p class="datetime" id="datetime">Current Date and Time (UTC): Loading...</p>
        </header>
        
        <div class="dashboard">
            <!-- Statistics Card -->
            <div class="card">
                <h2>📊 Statistics</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-number" id="total-messages">0</div>
                        <div class="stat-label">Total Messages</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="unread-messages">0</div>
                        <div class="stat-label">Unread</div>
                    </div>
                </div>
            </div>
            
            <!-- Status Card -->
            <div class="card">
                <h2>⚙️ Status</h2>
                <div class="status">
                    <div class="status-indicator"></div>
                    <div class="status-text">GSM Modem: Connected</div>
                </div>
                <div style="margin-top: 15px; color: #666;">
                    <p><strong>Port:</strong> /dev/ttyUSB0</p>
                    <p><strong>Baud Rate:</strong> 9600</p>
                </div>
                <button class="clear-btn" onclick="clearSIMStorage()" style="margin-top: 15px;">🗑️ Clear SIM Storage</button>
            </div>
        </div>
        
        <div class="dashboard">
            <!-- Send SMS Card -->
            <div class="card">
                <h2>✉️ Send SMS</h2>
                <div id="alert" class="alert"></div>
                <form id="sms-form">
                    <div class="form-group">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" id="phone" name="phone" placeholder="+1234567890" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" placeholder="Type your message..." required></textarea>
                    </div>
                    <button type="submit" id="send-btn">Send SMS</button>
                </form>
            </div>
            
            <!-- Messages Card -->
            <div class="card">
                <h2>📬 Recent Messages</h2>
                <div class="messages-list" id="messages-list">
                    <p style="color: #999;">No messages yet...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Update datetime
        function updateDateTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                timeZone: 'UTC'
            };
            document.getElementById('datetime').textContent = 
                'Current Date and Time (UTC): ' + now.toLocaleString('en-US', options);
        }
        
        // Update on load and every second
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        // Load stats
        function loadStats() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('total-messages').textContent = data.total_messages;
                    document.getElementById('unread-messages').textContent = data.unread_messages;
                })
                .catch(error => console.error('Error loading stats:', error));
        }
        
        // Load messages
        function loadMessages() {
            fetch('/api/messages')
                .then(response => response.json())
                .then(data => {
                    const messagesList = document.getElementById('messages-list');
                    
                    if (data.length === 0) {
                        messagesList.innerHTML = '<p style="color: #999;">No messages yet...</p>';
                        return;
                    }
                    
                    messagesList.innerHTML = data.map((msg, idx) => `
                        <div class="message-item ${msg.type}">
                            <div class="message-content">
                                <div class="message-from">${msg.type === 'sent' ? '📤' : '📥'} ${msg.phone}</div>
                                <div class="message-text">${msg.message}</div>
                                <div class="message-time">${new Date(msg.timestamp).toLocaleString()}</div>
                            </div>
                            <div class="message-actions">
                                <button class="delete-btn" onclick="deleteMessage(${idx})">🗑️ Delete</button>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(error => console.error('Error loading messages:', error));
        }
        
        // Delete message
        function deleteMessage(index) {
            if (confirm('Are you sure you want to delete this message?')) {
                fetch(`/api/message/${index}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        showAlert('✅ Message deleted!', 'success');
                        loadStats();
                        loadMessages();
                    } else {
                        showAlert('❌ Error deleting message', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showAlert('❌ Error deleting message', 'error');
                });
            }
        }
        
        // Clear SIM Storage
        function clearSIMStorage() {
            if (confirm('⚠️ This will delete ALL SMS from SIM card storage and clear the dashboard. Continue?')) {
                fetch('/api/clear-sim-storage', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        showAlert('✅ SIM storage cleared successfully!', 'success');
                        loadStats();
                        loadMessages();
                    } else {
                        showAlert('❌ Error clearing SIM storage: ' + data.message, 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showAlert('❌ Error clearing SIM storage', 'error');
                });
            }
        }
        
        // Show alert
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type;
            setTimeout(() => {
                alert.className = 'alert';
            }, 3000);
        }
        
        // Handle SMS form submission
        document.getElementById('sms-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;
            const btn = document.getElementById('send-btn');
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            
            fetch('/api/message', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    phone: phone,
                    message: message
                })
            })
            .then(response => response.json())
            .then(data => {
                showAlert('✅ SMS sent successfully!', 'success');
                document.getElementById('sms-form').reset();
                loadStats();
                loadMessages();
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('❌ Error sending SMS', 'error');
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'Send SMS';
            });
        });
        
        // Load initial data
        loadStats();
        loadMessages();
        
        // Refresh stats and messages every 5 seconds
        setInterval(() => {
            loadStats();
            loadMessages();
        }, 5000);
    </script>
</body>
</html>
