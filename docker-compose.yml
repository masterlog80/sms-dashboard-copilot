version: '3.8'

services:
  sms-dashboard:
    build: .
    image: sms-dashboard:latest
    container_name: sms-dashboard
    ports:
      - "8080:5000"
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    volumes:
      - ./data:/app/data
      - ./templates:/app/templates
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
    restart: unless-stopped
    stdin_open: true
    tty: true