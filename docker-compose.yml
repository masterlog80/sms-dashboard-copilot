version: '3.8'

services:
  sms-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-dashboard-copilot-sms-dashboard-1
    ports:
      - "5000:5000"
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - sms-network

networks:
  sms-network:
    driver: bridge
